  <script>
const scriptURL = 'https://script.google.com/macros/s/AKfycbzxSUMjwbTrrHpkK2mlotOlmyaJITJ0w6ntzUS2OiIyyk9gqetFgWIvLVL6YbbxvvGn/exec'; // Paste your Web App URL here
const form = document.getElementById('wedding-rsvp-form');
const btn = document.getElementById('submit-btn');
const msg = document.getElementById('success-msg');

form.addEventListener('submit', e => {
  e.preventDefault();
  btn.disabled = true;
  btn.innerHTML = "SAADAN...";

  fetch(scriptURL, { method: 'POST', body: new FormData(form)})
    .then(response => {
        form.style.display = 'none'; // Hide form on success
        msg.style.display = 'block'; // Show thank you message
    })
    .catch(error => {
        alert('Midagi läks valesti. Proovi uuesti!');
        btn.disabled = false;
        btn.innerHTML = "SAADA VASTUS";
    });
});
  </script>
